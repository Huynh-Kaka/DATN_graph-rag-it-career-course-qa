# Blueprint Render: Web Service (Docker) + PostgreSQL managed.
# Neo4j và Qdrant: dùng dịch vụ bên ngoài (Neo4j Aura, Qdrant Cloud) rồi gán env trên Dashboard.
# Triển khai: Dashboard → New → Blueprint → chọn repo, hoặc `render blueprint deploy`.
#
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: career-graph-rag
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    region: singapore
    healthCheckPath: /api/health
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash-lite
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USER
        sync: false
      - key: NEO4J_PASSWORD
        sync: false
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: QDRANT_COLLECTION
        value: career_roadmap
      - key: DATABASE_URL
        fromDatabase:
          name: career-chat-db
          property: connectionString

databases:
  - name: career-chat-db
    plan: free
    databaseName: career_chat
    user: career
